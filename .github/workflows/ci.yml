name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt

      - name: Check shell syntax
        run: |
          bash -n $(git ls-files '*.sh')

      - name: Compile Python scripts
        run: |
          python -m py_compile scripts/func.py files/initrd/opt/rr/include/functions.py

      - name: Validate JSON and YAML files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          import yaml

          for path in Path("docs").glob("*.json"):
              with path.open(encoding="utf-8") as fp:
                  json.load(fp)

          for path in [
              Path("update-list.yml"),
              Path("files/initrd/opt/rr/platforms.yml"),
              Path("files/initrd/opt/rr/serialnumber.yml"),
          ]:
              with path.open(encoding="utf-8") as fp:
                  yaml.safe_load(fp)
          PY

      - name: Validate gettext catalogs
        run: |
          find files/initrd/opt/rr/lang -name 'rr.po' -print0 |
            xargs -0 -n1 msgfmt --check --output-file=/dev/null
