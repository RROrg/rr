name: Build Custom RR Image + Verify + VMDK

on:
  workflow_dispatch:
    inputs:
      base_tag:
        description: "Base RR release tag"
        required: true
        default: "24.4.4"
      model:
        description: "Model label for output name"
        required: true
        default: "DS418play"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt update
          sudo apt install -y curl unzip xz-utils cpio dosfstools util-linux zip qemu-utils e2fsprogs jq

      - name: Download base RR image
        run: |
          set -euxo pipefail
          TAG="${{ inputs.base_tag }}"
          curl -kL --connect-timeout 20 \
            "https://github.com/RROrg/rr/releases/download/${TAG}/rr-${TAG}.img.zip" \
            -o rr-base.zip
          unzip rr-base.zip -d rr
          test -f rr/rr.img

      - name: Patch initrd with current source
        run: |
          set -euxo pipefail
          WORK="$GITHUB_WORKSPACE"
          IMG="$WORK/rr/rr.img"
          
          test -f "$WORK/files/initrd/opt/rr/model-configs/DS418play.yml"
          
          LOOP="$(sudo losetup -f --show -P "$IMG")"
          mkdir -p /tmp/rr_p3
          sudo mount "${LOOP}p3" /tmp/rr_p3
          
          rm -rf "$WORK/initrd_unpack" "$WORK/initrd_check"
          mkdir -p "$WORK/initrd_unpack" "$WORK/initrd_check"
          
          # unpack original
          (
            cd "$WORK/initrd_unpack"
            sudo xz -dc </tmp/rr_p3/initrd-rr | sudo cpio -idm
          )
          
          # minimal patch: only one file
          sudo mkdir -p "$WORK/initrd_unpack/opt/rr/model-configs"
          sudo cp -f "$WORK/files/initrd/opt/rr/model-configs/DS418play.yml" \
            "$WORK/initrd_unpack/opt/rr/model-configs/DS418play.yml"
          
          # repack
          (
            cd "$WORK/initrd_unpack"
            sudo find . 2>/dev/null | sudo cpio -o -H newc -R root:root | xz --check=crc32 > "$WORK/initrd-rr.new"
          )
          
          # sanity-check repacked initrd before replace
          xz -t "$WORK/initrd-rr.new"
          (
            cd "$WORK/initrd_check"
            sudo xz -dc <"$WORK/initrd-rr.new" | sudo cpio -idm
          )
          test -x "$WORK/initrd_check/init"
          test -f "$WORK/initrd_check/opt/rr/model-configs/DS418play.yml"
          
          sudo cp -f "$WORK/initrd-rr.new" /tmp/rr_p3/initrd-rr
          sync
          sudo umount /tmp/rr_p3
          sudo losetup -d "$LOOP"


      - name: Verify image integrity and patch results
        run: |
          set -euxo pipefail
          WORK="$GITHUB_WORKSPACE"
          IMG="$WORK/rr/rr.img"

          sudo fdisk -l "$IMG"

          LOOP="$(sudo losetup -f --show -P "$IMG")"
          mkdir -p /tmp/rr_p1 /tmp/rr_p3
          sudo mount "${LOOP}p1" /tmp/rr_p1
          sudo mount "${LOOP}p3" /tmp/rr_p3

          # core file checks
          test -f /tmp/rr_p1/boot/grub/grub.cfg
          test -f /tmp/rr_p1/RR_VERSION
          test -f /tmp/rr_p3/bzImage-rr
          test -f /tmp/rr_p3/initrd-rr

          # initrd integrity
          xz -t /tmp/rr_p3/initrd-rr

          rm -rf "$WORK/initrd_verify"
          mkdir -p "$WORK/initrd_verify"
          (
            cd "$WORK/initrd_verify"
            sudo xz -dc </tmp/rr_p3/initrd-rr | sudo cpio -idm
          )

          # patch presence check
          test -f "$WORK/initrd_verify/opt/rr/model-configs/DS418play.yml"

          # if docs exists in initrd, verify DS418play marker
          if [ -f "$WORK/initrd_verify/opt/rr/docs/models.json" ]; then
            grep -q '"DS418play"' "$WORK/initrd_verify/opt/rr/docs/models.json"
          fi

          sudo umount /tmp/rr_p1
          sudo umount /tmp/rr_p3

          # non-destructive fs checks
          sudo e2fsck -fn "${LOOP}p3" || true
          sudo fsck.vfat -n "${LOOP}p1" || true

          sudo losetup -d "$LOOP"

      - name: Build VMDK
        run: |
          set -euxo pipefail
          qemu-img convert -f raw -O vmdk \
            -o adapter_type=lsilogic,subformat=monolithicSparse \
            rr/rr.img rr/rr.vmdk
          qemu-img info rr/rr.vmdk

      - name: Package outputs
        run: |
          set -euxo pipefail
          BASE="${{ inputs.base_tag }}"
          MODEL="${{ inputs.model }}"

          IMG_ZIP="rr-${MODEL}-${BASE}-custom.img.zip"
          VMDK_ZIP="rr-${MODEL}-${BASE}-custom.vmdk.zip"

          zip -9 "$IMG_ZIP" -j rr/rr.img
          zip -9 "$VMDK_ZIP" -j rr/rr.vmdk

          sha256sum "$IMG_ZIP" > "${IMG_ZIP}.sha256"
          sha256sum "$VMDK_ZIP" > "${VMDK_ZIP}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rr-custom-${{ inputs.model }}-${{ inputs.base_tag }}
          path: |
            rr-${{ inputs.model }}-${{ inputs.base_tag }}-custom.img.zip
            rr-${{ inputs.model }}-${{ inputs.base_tag }}-custom.img.zip.sha256
            rr-${{ inputs.model }}-${{ inputs.base_tag }}-custom.vmdk.zip
            rr-${{ inputs.model }}-${{ inputs.base_tag }}-custom.vmdk.zip.sha256
          retention-days: 7
